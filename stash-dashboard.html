<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stash · Dashboard de Produtividade</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232736;
    --border: #2e3345;
    --text: #e4e6f0;
    --text-dim: #8b8fa3;
    --accent: #6c5ce7;
    --accent-light: #a29bfe;
    --green: #00b894;
    --orange: #fdcb6e;
    --red: #e17055;
    --blue: #74b9ff;
    --pink: #fd79a8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }

  .header {
    padding: 32px 40px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .header-left { display: flex; align-items: center; gap: 14px; }
  .header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
  .header .subtitle { color: var(--text-dim); font-size: 13px; margin-top: 2px; }
  .logo { font-size: 28px; }

  .file-input-area {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .file-input-area label {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .file-input-area label:hover {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  .file-input-area input[type="file"] { display: none; }
  .file-name { color: var(--text-dim); font-size: 12px; }

  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 28px 40px 60px;
  }

  /* KPI Cards */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }

  .kpi-card:nth-child(1)::before { background: var(--accent); }
  .kpi-card:nth-child(2)::before { background: var(--green); }
  .kpi-card:nth-child(3)::before { background: var(--orange); }
  .kpi-card:nth-child(4)::before { background: var(--blue); }
  .kpi-card:nth-child(5)::before { background: var(--pink); }
  .kpi-card:nth-child(6)::before { background: var(--red); }

  .kpi-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .kpi-value { font-size: 32px; font-weight: 700; letter-spacing: -1px; }
  .kpi-sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

  /* Chart panels */
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 28px;
  }

  .chart-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  .chart-panel h3 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 16px;
    color: var(--text);
  }

  .chart-container { position: relative; width: 100%; }
  .chart-container.bar { height: 260px; }
  .chart-container.doughnut { height: 240px; }

  /* Tables */
  .tables-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .table-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    max-height: 420px;
    overflow-y: auto;
  }

  .table-panel h3 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 14px;
    position: sticky;
    top: 0;
    background: var(--surface);
    padding-bottom: 8px;
  }

  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .task-item:last-child { border-bottom: none; }
  .task-emoji { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .task-text { flex: 1; color: var(--text); }
  .task-date { color: var(--text-dim); font-size: 11px; white-space: nowrap; flex-shrink: 0; }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
  }

  .badge-red { background: rgba(225, 112, 85, 0.15); color: var(--red); }
  .badge-orange { background: rgba(253, 203, 110, 0.15); color: var(--orange); }
  .badge-green { background: rgba(0, 184, 148, 0.15); color: var(--green); }
  .badge-blue { background: rgba(116, 185, 255, 0.15); color: var(--blue); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  .empty-state .emoji { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 14px; }

  .full-width { grid-column: 1 / -1; }

  @media (max-width: 768px) {
    .charts-grid, .tables-grid { grid-template-columns: 1fr; }
    .container { padding: 20px; }
    .header { padding: 20px; }
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="logo">📦</span>
    <div>
      <h1>Stash Dashboard</h1>
      <div class="subtitle">Visão geral da sua produtividade</div>
    </div>
  </div>
  <div class="file-input-area">
    <label for="fileInput">Carregar my_tasks.txt</label>
    <input type="file" id="fileInput" accept=".txt">
    <span class="file-name" id="fileName"></span>
  </div>
</div>

<div class="container" id="mainContent">
  <div class="empty-state">
    <div class="emoji">📂</div>
    <p>Carregue seu arquivo <strong>my_tasks.txt</strong> para visualizar o dashboard.</p>
  </div>
</div>

<script>
// ── Parser ──────────────────────────────────────────
function parseStashFile(text) {
  const lines = text.split('\n');
  const entries = [];
  let currentDate = null;

  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;

    // Date header
    const dateMatch = trimmed.match(/^📅\s*(\d{2}\/\d{2}\/\d{4})/);
    if (dateMatch) {
      const [d, m, y] = dateMatch[1].split('/');
      currentDate = `${y}-${m}-${d}`;
      continue;
    }

    if (!currentDate) continue;

    // Determine category
    let category = null;
    let emoji = '';
    if (trimmed.startsWith('📥')) { category = 'task'; emoji = '📥'; }
    else if (trimmed.startsWith('🔔')) { category = 'reminder'; emoji = '🔔'; }
    else if (trimmed.startsWith('❓')) { category = 'question'; emoji = '❓'; }
    else if (trimmed.startsWith('🎯')) { category = 'goal'; emoji = '🎯'; }
    else if (trimmed.startsWith('✅')) { category = 'task'; emoji = '✅'; }
    else continue;

    // Check completion
    const completedMatch = trimmed.match(/✅\s*(\d{2}\/\d{2}\/\d{4})/);
    const isCompleted = !!completedMatch || (trimmed.startsWith('✅'));
    let completedDate = null;
    if (completedMatch) {
      const [cd, cm, cy] = completedMatch[1].split('/');
      completedDate = `${cy}-${cm}-${cd}`;
    }

    // Reminder time
    const reminderMatch = trimmed.match(/⏰\s*(\d{2}\/\d{2}\/\d{4})\s*(\d{2}:\d{2})?/);
    let reminderDate = null;
    let reminderTime = null;
    if (reminderMatch) {
      const [rd, rm, ry] = reminderMatch[1].split('/');
      reminderDate = `${ry}-${rm}-${rd}`;
      reminderTime = reminderMatch[2] || null;
    }

    // Clean text
    let text = trimmed
      .replace(/^[📥🔔❓🎯✅]\s*/, '')
      .replace(/✅\s*\d{2}\/\d{2}\/\d{4}/, '')
      .replace(/⏰\s*\d{2}\/\d{2}\/\d{4}\s*\d{2}:\d{2}?/, '')
      .trim();

    entries.push({
      date: currentDate,
      category,
      emoji,
      text,
      completed: isCompleted,
      completedDate,
      reminderDate,
      reminderTime
    });
  }

  return entries;
}

// ── Metrics ─────────────────────────────────────────
function computeMetrics(entries) {
  const today = new Date().toISOString().slice(0, 10);
  const total = entries.length;
  const completed = entries.filter(e => e.completed).length;
  const open = total - completed;
  const rate = total > 0 ? Math.round((completed / total) * 100) : 0;

  // By category
  const byCategory = { task: 0, reminder: 0, question: 0, goal: 0 };
  entries.forEach(e => { byCategory[e.category] = (byCategory[e.category] || 0) + 1; });

  // By date (captures per day)
  const byDate = {};
  const completedByDate = {};
  entries.forEach(e => {
    byDate[e.date] = (byDate[e.date] || 0) + 1;
    if (e.completed && e.completedDate) {
      completedByDate[e.completedDate] = (completedByDate[e.completedDate] || 0) + 1;
    }
  });

  // Open items sorted by age (oldest first)
  const openItems = entries
    .filter(e => !e.completed)
    .map(e => {
      const created = new Date(e.date);
      const now = new Date(today);
      const ageDays = Math.floor((now - created) / (1000 * 60 * 60 * 24));
      return { ...e, ageDays };
    })
    .sort((a, b) => b.ageDays - a.ageDays);

  // Upcoming reminders
  const upcoming = entries
    .filter(e => e.category === 'reminder' && e.reminderDate && e.reminderDate >= today && !e.completed)
    .sort((a, b) => (a.reminderDate + (a.reminderTime || '')) .localeCompare(b.reminderDate + (b.reminderTime || '')));

  // Resolution time (items with completedDate)
  const resolved = entries
    .filter(e => e.completed && e.completedDate)
    .map(e => {
      const created = new Date(e.date);
      const done = new Date(e.completedDate);
      return Math.max(0, Math.floor((done - created) / (1000 * 60 * 60 * 24)));
    });
  const avgResolution = resolved.length > 0 ? (resolved.reduce((a, b) => a + b, 0) / resolved.length).toFixed(1) : '—';

  // Weekly data (last 4 weeks)
  const weeks = [];
  const nowDate = new Date(today);
  for (let i = 3; i >= 0; i--) {
    const weekStart = new Date(nowDate);
    weekStart.setDate(nowDate.getDate() - (i * 7 + nowDate.getDay()));
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekStart.getDate() + 6);
    const ws = weekStart.toISOString().slice(0, 10);
    const we = weekEnd.toISOString().slice(0, 10);

    let captured = 0, done = 0;
    entries.forEach(e => {
      if (e.date >= ws && e.date <= we) captured++;
      if (e.completedDate && e.completedDate >= ws && e.completedDate <= we) done++;
    });

    const label = `${weekStart.getDate()}/${weekStart.getMonth() + 1}`;
    weeks.push({ label, captured, done });
  }

  return { total, completed, open, rate, byCategory, byDate, openItems, upcoming, avgResolution, weeks, completedByDate };
}

// ── Render ──────────────────────────────────────────
function renderDashboard(entries) {
  const m = computeMetrics(entries);
  const container = document.getElementById('mainContent');

  // Date range
  const dates = entries.map(e => e.date).sort();
  const first = dates[0];
  const last = dates[dates.length - 1];

  function formatBR(isoDate) {
    if (!isoDate) return '';
    const [y, mo, d] = isoDate.split('-');
    return `${d}/${mo}/${y}`;
  }

  function ageBadge(days) {
    if (days >= 14) return `<span class="badge badge-red">${days}d</span>`;
    if (days >= 7) return `<span class="badge badge-orange">${days}d</span>`;
    return `<span class="badge badge-green">${days}d</span>`;
  }

  container.innerHTML = `
    <!-- KPIs -->
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Total capturado</div>
        <div class="kpi-value">${m.total}</div>
        <div class="kpi-sub">${formatBR(first)} — ${formatBR(last)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Concluídas</div>
        <div class="kpi-value" style="color: var(--green)">${m.completed}</div>
        <div class="kpi-sub">Taxa de ${m.rate}%</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Em aberto</div>
        <div class="kpi-value" style="color: var(--orange)">${m.open}</div>
        <div class="kpi-sub">Aguardando ação</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Tempo médio resolução</div>
        <div class="kpi-value">${m.avgResolution}</div>
        <div class="kpi-sub">${m.avgResolution !== '—' ? 'dias' : 'sem dados suficientes'}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Lembretes futuros</div>
        <div class="kpi-value" style="color: var(--blue)">${m.upcoming.length}</div>
        <div class="kpi-sub">Agendados</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Categorias ativas</div>
        <div class="kpi-value">${Object.values(m.byCategory).filter(v => v > 0).length}</div>
        <div class="kpi-sub">de 4 possíveis</div>
      </div>
    </div>

    <!-- Charts -->
    <div class="charts-grid">
      <div class="chart-panel">
        <h3>Captura vs. Conclusão por semana</h3>
        <div class="chart-container bar"><canvas id="weeklyChart"></canvas></div>
      </div>
      <div class="chart-panel">
        <h3>Distribuição por categoria</h3>
        <div class="chart-container doughnut"><canvas id="categoryChart"></canvas></div>
      </div>
      <div class="chart-panel full-width">
        <h3>Capturas por dia</h3>
        <div class="chart-container bar"><canvas id="dailyChart"></canvas></div>
      </div>
    </div>

    <!-- Tables -->
    <div class="tables-grid">
      <div class="table-panel">
        <h3>🕐 Backlog — itens abertos por idade</h3>
        <div id="backlogList"></div>
      </div>
      <div class="table-panel">
        <h3>🔔 Próximos lembretes</h3>
        <div id="remindersList"></div>
      </div>
    </div>
  `;

  // ── Weekly bar chart ──
  new Chart(document.getElementById('weeklyChart'), {
    type: 'bar',
    data: {
      labels: m.weeks.map(w => 'Sem. ' + w.label),
      datasets: [
        {
          label: 'Capturadas',
          data: m.weeks.map(w => w.captured),
          backgroundColor: 'rgba(108, 92, 231, 0.7)',
          borderRadius: 6,
          barPercentage: 0.6
        },
        {
          label: 'Concluídas',
          data: m.weeks.map(w => w.done),
          backgroundColor: 'rgba(0, 184, 148, 0.7)',
          borderRadius: 6,
          barPercentage: 0.6
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#8b8fa3', font: { size: 11 } } } },
      scales: {
        x: { ticks: { color: '#8b8fa3' }, grid: { color: 'rgba(46,51,69,0.5)' } },
        y: { ticks: { color: '#8b8fa3', stepSize: 1 }, grid: { color: 'rgba(46,51,69,0.5)' }, beginAtZero: true }
      }
    }
  });

  // ── Category doughnut ──
  const catLabels = [];
  const catData = [];
  const catColors = [];
  const catMap = { task: ['📥 Tarefas', '#6c5ce7'], reminder: ['🔔 Lembretes', '#74b9ff'], question: ['❓ Perguntas', '#fdcb6e'], goal: ['🎯 Metas', '#fd79a8'] };
  for (const [key, [label, color]] of Object.entries(catMap)) {
    if (m.byCategory[key] > 0) {
      catLabels.push(label);
      catData.push(m.byCategory[key]);
      catColors.push(color);
    }
  }

  new Chart(document.getElementById('categoryChart'), {
    type: 'doughnut',
    data: {
      labels: catLabels,
      datasets: [{ data: catData, backgroundColor: catColors, borderWidth: 0, hoverOffset: 6 }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '65%',
      plugins: {
        legend: { position: 'right', labels: { color: '#8b8fa3', font: { size: 12 }, padding: 14, usePointStyle: true, pointStyleWidth: 10 } }
      }
    }
  });

  // ── Daily captures ──
  const sortedDates = Object.keys(m.byDate).sort();
  new Chart(document.getElementById('dailyChart'), {
    type: 'bar',
    data: {
      labels: sortedDates.map(d => { const [y, mo, day] = d.split('-'); return `${day}/${mo}`; }),
      datasets: [{
        label: 'Itens capturados',
        data: sortedDates.map(d => m.byDate[d]),
        backgroundColor: 'rgba(162, 155, 254, 0.6)',
        borderRadius: 4,
        barPercentage: 0.7
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#8b8fa3', font: { size: 10 } }, grid: { display: false } },
        y: { ticks: { color: '#8b8fa3', stepSize: 1 }, grid: { color: 'rgba(46,51,69,0.5)' }, beginAtZero: true }
      }
    }
  });

  // ── Backlog list ──
  const backlogEl = document.getElementById('backlogList');
  if (m.openItems.length === 0) {
    backlogEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-dim)">Nenhum item em aberto! 🎉</div>';
  } else {
    backlogEl.innerHTML = m.openItems.map(item => `
      <div class="task-item">
        <span class="task-emoji">${item.emoji}</span>
        <span class="task-text">${item.text}</span>
        <span class="task-date">${ageBadge(item.ageDays)}</span>
      </div>
    `).join('');
  }

  // ── Reminders list ──
  const remEl = document.getElementById('remindersList');
  if (m.upcoming.length === 0) {
    remEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-dim)">Sem lembretes futuros</div>';
  } else {
    remEl.innerHTML = m.upcoming.map(item => `
      <div class="task-item">
        <span class="task-emoji">🔔</span>
        <span class="task-text">${item.text}</span>
        <span class="task-date"><span class="badge badge-blue">${formatBR(item.reminderDate)}${item.reminderTime ? ' ' + item.reminderTime : ''}</span></span>
      </div>
    `).join('');
  }
}

// ── File input ──────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('fileName').textContent = file.name;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const entries = parseStashFile(ev.target.result);
    renderDashboard(entries);
  };
  reader.readAsText(file);
});
