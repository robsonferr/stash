<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Returning to Stash PRO</title>
  <meta http-equiv="refresh" content="0; url=/pro/?checkout=cancel">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1117;
      --surface: #1a1d27;
      --text: #f8fafc;
      --muted: #9ca3af;
      --accent: #8b5cf6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(100%, 560px);
      padding: 32px;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px;
      background: var(--surface);
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.15;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    a {
      color: var(--accent);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <h1>Checkout canceled</h1>
    <p>
      Redirecting you back to the Stash PRO page…
      If nothing happens, <a href="/pro/?checkout=cancel">continue here</a>.
    </p>
  </main>
  <script>
    window.location.replace('/pro/?checkout=cancel');
  </script>
</body>
</html>
