<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting to Stash PRO</title>
  <meta name="theme-color" content="#0f1117" data-theme-color-dark="#0f1117" data-theme-color-light="#f8fafc">
  <script src="../../theme.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1117;
      --surface: #1a1d27;
      --text: #f8fafc;
      --muted: #9ca3af;
      --accent: #8b5cf6;
      --border: rgba(255,255,255,.08);
      --shadow: 0 20px 60px rgba(0,0,0,.35);
    }

    :root[data-theme="light"] {
      color-scheme: light;
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --accent: #2563eb;
      --border: rgba(15,23,42,.08);
      --shadow: 0 18px 40px rgba(15,23,42,.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(100%, 560px);
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--surface);
      text-align: center;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.15;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    a {
      color: var(--accent);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <h1>Payment received</h1>
    <p>
      Redirecting you to the Stash PRO page…
      If nothing happens, <a id="continue-link" href="/pro/?checkout=success">continue here</a>.
    </p>
  </main>
  <script>
    const destination = new URL('/pro/', window.location.origin);
    const currentParams = new URLSearchParams(window.location.search);

    currentParams.forEach((value, key) => {
      destination.searchParams.set(key, value);
    });
    destination.searchParams.set('checkout', 'success');

    const continueLink = document.getElementById('continue-link');
    continueLink.href = destination.toString();
    window.location.replace(destination.toString());
  </script>
</body>
</html>
